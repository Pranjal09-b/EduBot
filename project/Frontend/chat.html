<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CS Learning Chatbot</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  box-sizing: border-box;
  font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
}

body {
  margin: 0;
  background: #f0f2f5;
  min-height: 100vh;
}

/* MAIN LAYOUT */
.container {
  display: flex;
  min-height: 100vh;
}

/* SIDEBAR */
.sidebar {
  width: 220px;
  background: #ffffff;
  border-right: 1px solid #eee;
  padding: 25px 18px;
  display: flex;
  flex-direction: column;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 20px;
  font-weight: 700;
  color: #6f42c1;
  margin-bottom: 40px;
}

.nav-btn {
  background: none;
  border: none;
  padding: 12px 14px;
  border-radius: 10px;
  text-align: left;
  font-size: 15px;
  font-weight: 600;
  color: #555;
  cursor: pointer;
  margin-bottom: 8px;
  transition: 0.2s;
}

.nav-btn:hover {
  background: #f3e8ff;
  color: #6f42c1;
}

.nav-btn.active {
  background: #6f42c1;
  color: #fff;
}

/* MAIN CONTENT */
.main {
  flex: 1;
  padding: 28px 32px;
  display: flex;
  flex-direction: column;
}

/* HEADER */
.header {
  display: flex;
  justify-content: flex-end;
  align-items: center;
  border-bottom: 1px solid #eee;
  padding-bottom: 16px;
}

.logout {
  border: 1px solid #ddd;
  padding: 8px 14px;
  border-radius: 8px;
  background: #fff;
  cursor: pointer;
  font-weight: 600;
}

/* TITLE */
.title {
  margin: 24px 0 18px;
}

.title h1 {
  margin: 0;
  font-size: 26px;
}

.title p {
  margin-top: 6px;
  color: #555;
}

/* CONTENT */
.content {
  display: flex;
  gap: 20px;
  flex: 1;
}

/* CHAT AREA */
.chat-area {
  flex: 2;
  display: flex;
  flex-direction: column;
}

.chat-messages {
  background: #fafafa;
  padding: 20px;
  border-radius: 12px;
  height: 400px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

.message {
  max-width: 70%;
  padding: 12px 16px;
  border-radius: 12px;
  margin-bottom: 12px;
  line-height: 1.4;
  font-size: 15px;
}

.bot {
  background: #f1e4ff;
  align-self: flex-start;
  border-top-left-radius: 0;
}

.user {
  background: #6f42c1;
  color: white;
  align-self: flex-end;
  border-top-right-radius: 0;
}

/* INPUT */
.chat-input {
  display: flex;
  gap: 12px;
  margin-top: 16px;
}

.chat-input input {
  flex: 1;
  padding: 12px 14px;
  font-size: 15px;
  border-radius: 8px;
  border: 1px solid #ccc;
  outline: none;
}

.chat-input button {
  background: #6f42c1;
  color: #fff;
  border: none;
  padding: 12px 20px;
  font-size: 15px;
  font-weight: 600;
  border-radius: 8px;
  cursor: pointer;
}

.chat-input button:hover {
  background: #5a34a1;
}

/* STATS PANEL */
.stats {
  flex: 1;
  background: #fafafa;
  border-radius: 12px;
  padding: 20px;
  height: fit-content;
  border: 1px solid #eee;
}

.stat {
  text-align: center;
  padding: 14px 0;
  border-bottom: 1px solid #e5e5e5;
}

.stat:last-child {
  border-bottom: none;
}

.stat h3 {
  margin: 0;
  font-size: 24px;
  color: #6f42c1;
}

.stat.blue h3 {
  color: #007bff;
}

.stat.purple h3 {
  color: #7b2cbf;
}

.stat p {
  margin: 6px 0 0;
  font-size: 14px;
  color: #555;
}
</style>
</head>

<body>

<div class="container">

  <!-- LEFT SIDEBAR -->
  <div class="sidebar">
    <div class="brand">📘 EduBot</div>

    <button class="nav-btn" onclick="goTo('/home')">🏠 Home</button>
    <button class="nav-btn active">💬 Chat</button>
    <button class="nav-btn" onclick="goTo('/program')">💻 Program</button>
    <button class="nav-btn" onclick="goTo('/quiz')">📝 Quiz</button>
    <button class="nav-btn" onclick="goTo('/flashcard')">📚 Cards</button>
    <button class="nav-btn" onclick="goTo('/progress')">📊 Progress</button>
    <button class="nav-btn" onclick="goTo('/help')">❓ Help</button>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main">

    <!-- Header -->
    <div class="header">
      <button class="logout" onclick="logout()">Logout</button>
    </div>

    <!-- Title -->
    <div class="title">
      <h1>CS Learning Chatbot</h1>
      <p>Ask questions about Java, quizzes, or programming concepts</p>
    </div>

    <!-- Content -->
    <div class="content">

      <!-- Chat Area -->
      <div class="chat-area">
        <div class="chat-messages" id="chatMessages">
          <div class="message bot">
            Hi 👋 I’m your CS Learning Assistant. Ask me about Java, quizzes, or programming concepts!
          </div>
        </div>

        <div class="chat-input">
          <input type="text" id="userInput" placeholder="Type your message..." onkeypress="handleEnter(event)">
          <button onclick="sendMessage()">Send</button>
        </div>
      </div>

      <!-- Stats -->
      <div class="stats">
        <div class="stat">
          <h3>85%</h3>
          <p>Knowledge Score</p>
        </div>
        <div class="stat blue">
          <h3 id="questionCount">0</h3>
          <p>Questions Asked</p>
        </div>
        <div class="stat purple">
          <h3>4</h3>
          <p>Perfect Interactions</p>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
const chatMessages = document.getElementById("chatMessages");
const userInput = document.getElementById("userInput");
let questionCount = 0;

async function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;

    addMessage(text, "user");
    userInput.value = "";

    try {
        const response = await fetch("/ask", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: text })
        });

        const data = await response.json();
        addMessage(data.reply, "bot");
        updateStats();

    } catch (error) {
        addMessage("Server error. Try again later.", "bot");
    }
}

function handleEnter(e) {
    if (e.key === "Enter") sendMessage();
}

function addMessage(text, sender) {
    const msg = document.createElement("div");
    msg.classList.add("message", sender);
    msg.textContent = text;
    chatMessages.appendChild(msg);
    chatMessages.scrollTop = chatMessages.scrollHeight;
}

async function loadChatHistory() {
    try {
        const response = await fetch("/chat-history");
        const data = await response.json();

        data.chats.forEach(chat => {
            addMessage(chat[0], "user");
            addMessage(chat[1], "bot");
            questionCount++;
        });

        document.getElementById("questionCount").textContent = questionCount;

    } catch (error) {
        console.log("No chat history found");
    }
}

function updateStats() {
    questionCount++;
    document.getElementById("questionCount").textContent = questionCount;
}

function goTo(page) {
    window.location.href = page;
}

function logout() {
    window.location.href = "/logout";
}

window.onload = loadChatHistory;
</script>

</body>
</html>
