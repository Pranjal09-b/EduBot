<!DOCTYPE html>
<html>
<head>
    <title>Admin - Quizzes</title>
</head>
<body>

<h2>All Quizzes</h2>

<a href="/admin/add_quiz">Create New Quiz</a>
<br><br>

<table border="1" cellpadding="10">
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Created At</th>
        <th>Actions</th>
    </tr>

    {% for quiz in quizzes %}
    <tr>
        <td>{{ quiz.quiz_id }}</td>
        <td>{{ quiz.title }}</td>
        <td>{{ quiz.created_at }}</td>
        <td>
            <a href="/admin/questions/{{ quiz.quiz_id }}">View Questions</a> |
            <a href="/admin/add_question/{{ quiz.quiz_id }}">Add Question</a>
        </td>
    </tr>
    {% endfor %}

</table>

<br>
<a href="/admin/dashboard">Back to Dashboard</a>

</body>
</html>
