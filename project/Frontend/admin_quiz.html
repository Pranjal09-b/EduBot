<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Manage Quizzes</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background-color: #f4f6f9;
}

.container {
    display: flex;
}

.sidebar {
    width: 240px;
    height: 100vh;
    background-color: #1e293b;
    color: white;
    padding: 20px;
    position: fixed;
}

.sidebar h2 {
    text-align: center;
    margin-bottom: 40px;
}

.sidebar a {
    color: white;
    text-decoration: none;
    display: block;
    padding: 12px;
    border-radius: 6px;
    margin-bottom: 10px;
}

.sidebar a:hover {
    background-color: #334155;
}

.main {
    margin-left: 260px;
    padding: 30px;
    flex: 1;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.08);
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 12px;
    border-bottom: 1px solid #ddd;
}

th {
    background-color: #2563eb;
    color: white;
}

button {
    padding: 6px 12px;
    border: none;
    border-radius: 6px;
    background-color: #2563eb;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<div class="sidebar">
    <h2>EduBot Admin</h2>
    <a href="/admin/dashboard">Dashboard</a>
    <a href="/admin/quizzes">Manage Quizzes</a>
    <a href="/admin/programs">Manage Programs</a>
    <a href="/admin/results">View Results</a>
    <a href="/admin/logout">Logout</a>
</div>

<div class="main">
    <h1>Manage Quizzes</h1>

    <div class="card">
        <a href="/admin/add_quiz"><button>Create New Quiz</button></a>
        <br><br>

        <table>
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Created At</th>
                <th>Actions</th>
            </tr>

            {% for quiz in quizzes %}
            <tr>
                <td>{{ quiz.quiz_id }}</td>
                <td>{{ quiz.title }}</td>
                <td>{{ quiz.created_at }}</td>
                <td>
                    <a href="/admin/questions/{{ quiz.quiz_id }}">View</a> |
                    <a href="/admin/add_question/{{ quiz.quiz_id }}">Add Question</a>
                </td>
            </tr>
            {% endfor %}
        </table>
    </div>
</div>

</div>
</body>
</html>
