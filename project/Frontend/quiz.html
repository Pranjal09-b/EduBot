<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quizzes - EduBot</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  box-sizing: border-box;
  font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
}

body {
  margin: 0;
  background: #f0f2f5;
  min-height: 100vh;
}

/* MAIN LAYOUT */
.container {
  display: flex;
  min-height: 100vh;
}

/* LEFT SIDEBAR */
.main-sidebar {
  width: 220px;
  background: #ffffff;
  border-right: 1px solid #eee;
  padding: 25px 18px;
  display: flex;
  flex-direction: column;
}

.brand {
  font-size: 20px;
  font-weight: 700;
  color: #6f42c1;
  margin-bottom: 40px;
}

.nav-btn {
  background: none;
  border: none;
  padding: 12px 14px;
  border-radius: 10px;
  text-align: left;
  font-size: 15px;
  font-weight: 600;
  color: #555;
  cursor: pointer;
  margin-bottom: 8px;
  transition: 0.2s;
}

.nav-btn:hover {
  background: #f3e8ff;
  color: #6f42c1;
}

.nav-btn.active {
  background: #6f42c1;
  color: #fff;
}

/* MAIN CONTENT */
.main {
  flex: 1;
  padding: 28px 32px;
  display: flex;
  flex-direction: column;
}

/* HEADER */
.header {
  display: flex;
  justify-content: flex-end;
  align-items: center;
  border-bottom: 1px solid #eee;
  padding-bottom: 16px;
}

.logout {
  border: 1px solid #ddd;
  padding: 8px 14px;
  border-radius: 8px;
  background: #fff;
  cursor: pointer;
  font-weight: 600;
}

/* TITLE */
.title {
  margin: 24px 0 18px;
}

.title h1 {
  margin: 0;
  font-size: 26px;
}

.title p {
  margin-top: 6px;
  color: #555;
}

/* QUIZ CARDS */
.quiz-card {
  background: #ffffff;
  border-radius: 14px;
  padding: 20px;
  margin-bottom: 18px;
  box-shadow: 0 5px 15px rgb(0 0 0 / 0.08);
  transition: 0.3s;
}

.quiz-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 20px rgb(0 0 0 / 0.12);
}

.quiz-card h3 {
  margin: 0;
  color: #333;
}

.quiz-card a {
  display: inline-block;
  margin-top: 10px;
  text-decoration: none;
  font-weight: 600;
  color: #6f42c1;
}

.quiz-card a:hover {
  text-decoration: underline;
}
</style>
</head>

<body>

<div class="container">

  <!-- LEFT SIDEBAR -->
  <div class="main-sidebar">
    <div class="brand">📘 EduBot</div>

    <button class="nav-btn" onclick="goTo('/home')">🏠 Home</button>
    <button class="nav-btn" onclick="goTo('/chat')">💬 Chat</button>
    <button class="nav-btn" onclick="goTo('/program')">💻 Program</button>
    <button class="nav-btn active">📝 Quiz</button>
    <button class="nav-btn" onclick="goTo('/flashcard')">📚 Cards</button>
    <button class="nav-btn" onclick="goTo('/progress')">📊 Progress</button>
    <button class="nav-btn" onclick="goTo('/help')">❓ Help</button>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main">

    <!-- Header -->
    <div class="header">
      <button class="logout" onclick="window.location.href='/logout'">
        Logout
      </button>
    </div>

    <!-- Title -->
    <div class="title">
      <h1>Available Quizzes</h1>
      <p>Choose a quiz and test your knowledge</p>
    </div>

    <!-- Quiz List -->
    {% for quiz in quizzes %}
    <div class="quiz-card">
      <h3>{{ quiz.title }}</h3>
      <a href="/start_quiz/{{ quiz.quiz_id }}">Start Quiz →</a>
    </div>
    {% endfor %}

  </div>

</div>

<script>
function goTo(page){
  window.location.href = page;
}
</script>

</body>
</html>
