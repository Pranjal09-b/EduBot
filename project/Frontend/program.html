<html lang="en">
<head>
<meta charset="UTF-8">
<title>Programs - EduBot</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  box-sizing: border-box;
  font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
}

body {
  margin: 0;
  background: #f0f2f5;
  min-height: 100vh;
}

/* MAIN LAYOUT */
.container {
  display: flex;
  min-height: 100vh;
}

/* LEFT SIDEBAR (MAIN NAVIGATION) */
.main-sidebar {
  width: 220px;
  background: #ffffff;
  border-right: 1px solid #eee;
  padding: 25px 18px;
  display: flex;
  flex-direction: column;
}

.brand {
  font-size: 20px;
  font-weight: 700;
  color: #6f42c1;
  margin-bottom: 40px;
}

.nav-btn {
  background: none;
  border: none;
  padding: 12px 14px;
  border-radius: 10px;
  text-align: left;
  font-size: 15px;
  font-weight: 600;
  color: #555;
  cursor: pointer;
  margin-bottom: 8px;
  transition: 0.2s;
}

.nav-btn:hover {
  background: #f3e8ff;
  color: #6f42c1;
}

.nav-btn.active {
  background: #6f42c1;
  color: #fff;
}

/* MAIN CONTENT */
.main {
  flex: 1;
  padding: 28px 32px;
  display: flex;
  flex-direction: column;
}

/* HEADER */
.header {
  display: flex;
  justify-content: flex-end;
  align-items: center;
  border-bottom: 1px solid #eee;
  padding-bottom: 16px;
}

.logout {
  border: 1px solid #ddd;
  padding: 8px 14px;
  border-radius: 8px;
  background: #fff;
  cursor: pointer;
  font-weight: 600;
}

/* TITLE */
.title {
  margin: 24px 0 18px;
}

.title h1 {
  margin: 0;
  font-size: 26px;
}

.title p {
  margin-top: 6px;
  color: #555;
}

/* PROGRAM CONTENT LAYOUT */
.content {
  display: grid;
  grid-template-columns: 240px 1fr;
  gap: 20px;
  flex: 1;
}

/* INNER PROGRAM SIDEBAR */
.sidebar {
  border-right: 1px solid #eee;
  padding-right: 12px;
}

.sidebar h3 {
  margin-bottom: 12px;
}

.program-list {
  list-style: none;
  padding: 0;
  margin: 0;
}

.program-list li {
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
  margin-bottom: 6px;
  transition: background 0.2s;
}

.program-list li:hover {
  background: #f1e4ff;
}

/* PROGRAM CARD */
.program-card {
  background: #fff;
  border-radius: 14px;
  padding: 20px;
  box-shadow: 0 5px 15px rgb(0 0 0 / 0.1);
}

.program-title {
  font-size: 20px;
  font-weight: 700;
  color: #6f42c1;
  margin-bottom: 12px;
}

pre {
  background: #f8f8f8;
  padding: 15px;
  border-radius: 10px;
  overflow-x: auto;
}
</style>
</head>

<body>

<div class="container">

  <!-- LEFT MAIN SIDEBAR -->
  <div class="main-sidebar">
    <div class="brand">📘 EduBot</div>

    <button class="nav-btn" onclick="goTo('/home')">🏠 Home</button>
    <button class="nav-btn" onclick="goTo('/chat')">💬 Chat</button>
    <button class="nav-btn active">💻 Program</button>
    <button class="nav-btn" onclick="goTo('/quiz')">📝 Quiz</button>
    <button class="nav-btn" onclick="goTo('/flashcard')">📚 Cards</button>
    <button class="nav-btn" onclick="goTo('/progress')">📊 Progress</button>
    <button class="nav-btn" onclick="goTo('/help')">❓ Help</button>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main">

    <!-- Header -->
    <div class="header">
      <button class="logout" onclick="window.location.href='/logout'">Logout</button>
    </div>

    <!-- Title -->
    <div class="title">
      <h1>Programming Examples</h1>
      <p>Select a program topic to view code snippets</p>
    </div>

    <!-- Content -->
    <div class="content">

      <!-- Program List Sidebar -->
      <div class="sidebar">
        <h3>Programs</h3>
        <ul class="program-list">
          {% for p in programs %}
<li 
  data-title="{{ p.title }}"
  data-code="{{ p.code_snippet | e }}"
  data-explanation="{{ p.explanation | e }}"
  onclick="showProgram(this)">
  {{ p.title }}
</li>
{% endfor %}

        </ul>
      </div>

      <!-- Program Display Card -->
      <div class="program-card">
        <div class="program-title" id="programTitle">
          Select a Program
        </div>
        <pre id="programCode">Code will appear here...</pre>
         <div class="explanation-section">
        <h3>Explanation:</h3>
        <p id="programExplanation">Explanation will appear here...</p>
        </div>
      </div>

    </div>

  </div>
</div>

<script>
function goTo(page) {
  window.location.href = page;
}

function showProgram(element) {
  const title = element.getAttribute("data-title");
  const code = element.getAttribute("data-code");
  const explanation = element.getAttribute("data-explanation");

  document.getElementById("programTitle").innerText = title;
  document.getElementById("programCode").innerText = code;
  document.getElementById("programExplanation").innerText = explanation;
}
</script>



</body>
</html>
